- id: digital-archives
  title: "Digital Archives: Reading and Manipulating Large-Scale Catalogues, Curating and Creating Small-Scale Archives"
  instructors: 
    - "Yael Netzer"
  duration: "both weeks"
  abstract: |
    The purpose of this two-week workshop is to develop practical and critical skills toward the representation of knowledge in digital archives and to build a small-scale digital archive.  This workshop blends theory and hands-on activities, enabling participants to engage with digital catalogues, metadata structures, and archival curation tools.  Additional Open Lab Session: An optional free exploration day will be available for participants to receive one-on-one guidance on their projects and tools.  No prior knowledge is required for this workshop. Participants are encouraged to bring their own datasets but will be provided with starter collections if needed. 
  syllabus: |
    The purpose of this two-week workshop is to develop practical and critical skills toward the representation of knowledge in digital archives and to build a small-scale digital archive.  This workshop blends theory and hands-on activities, enabling participants to engage with digital catalogues, metadata structures, and archival curation tools.  Additional Open Lab Session: An optional free exploration day will be available for participants to receive one-on-one guidance on their projects and tools.  No prior knowledge is required for this workshop. Participants are encouraged to bring their own datasets but will be provided with starter collections if needed. 

    **Week 1 – Reading and Working with Data / Collections in OpenRefine**
    
    Digital data in various formats is at the heart of humanities research.  Often, datasets are large, messy, or structured in unfamiliar ways.  This week, students will learn to inspect, clean, and enrich digital catalogues using OpenRefine, as well as how to enhance datasets with Linked Open Data (LOD) from sources such as the Library of Congress, VIAF, and Wikidata. 
    By the end of this week, students will be proficient in: 
    * Understanding different file formats (CSV, TSV, Spreadsheets, JSON, XML TEI) 
    * Using regular expressions for data manipulation (with some skill and aid from chatGPT) 
    * Writing expressions with GREL (OpenRefine’s scripting language) 
    * Fetching and reconciling data via REST API (e.g., GeoNames, Wikidata) 
    * Scraping and structuring data from the web 
    * Mapping textual data to geographic locations 

    **Schedule:** 
    * Class 1: Introduction, loading a file, faceting, and exploring data 
    * Class 2: Regular expressions and working with dates 
    * Class 3: Clustering techniques for data cleaning 
    * Class 4: Fetching external data using REST APIs (GeoNames example) 
    * Hands-On Session: Practicing administrative tasks (changing working directory, memory allocation) 
    * Class 5: Reconciliation and enriching data with Wikidata 
    * Class 6: Handling JSON and XML file formats 
    * Class 7: Web scraping techniques and automation 
    * Class 8: From text to map – Geospatial representations in OpenRefine 
    * Class 9: Summary and discussion 

    **Week 2 – Building a Digital Archive: Archives of the Present**
    This week focuses on the creation and structuring of small-scale digital archives, but also introduces the concept of archives of the present—a critical reflection on how contemporary events, data, and digital traces shape our archival practices.  Participants will work with their own or provided collections, conceptualizing metadata structures and curatorial strategies.  The workshop covers best practices in digital archive development, including metadata schema selection, linked data integration, and user-friendly design. 
    The discussion of archives of the present will explore: 
    * How digital documentation of real-time events (social media, news articles, live-streamed content) can be archived 
    * The ethical challenges of archiving contemporary materials 
    * Methods for ensuring accessibility and preservation of ephemeral data 
    * The evolving nature of authority files and metadata in fast-changing digital environments 
    By the end of this week, students will be proficient in: 
    * Theoretical foundations of archival studies 
    * Metadata structuring and best practices 
    * Using Omeka-S for archive implementation 
    * Using Tropy for organizing and annotating images 
    * Linking archives to external sources and ontologies 
    * Designing and publishing an accessible, structured digital archive 
    * Engaging with contemporary data collection and preservation strategies 

    **Schedule:** 
    * Class 1: Theory of archives – an introduction 
    * Class 2: Digital archives – examples and reviewing participant collections 
    * Class 3: Modeling the domain 
    * Class 4: Metadata – methods of description, challenges, and dilemmas 
    * Class 5: Introduction to Omeka-S – setting up and structuring an archive 
    * Class 6: Using Tropy – basic features and integration with Omeka 
    * Hands-On Session: Working on participant collections 
    * Class 7: Archives of the present – Capturing and preserving digital traces 
    * Class 8: Linking and integrating with external resources and authority files 
    * Class 9: Publishing – designing Omeka pages for public access 
    * Class 10: Summary and reflections 

    To enrich the learning experience, this workshop will aim to incorporate: 
    * Case studies of successful digital archive projects 
    * Collaborative group work, where teams handle different types of archival materials 
    * Expanded toolset beyond OpenRefine and Omeka, including basic Python for data manipulation and SPARQL for querying LOD sources 
    * Introduction to IIIF (International Image Interoperability Framework) for handling digital images in archives 
    * Machine learning-assisted metadata extraction, including OCR (Transkribus), Google Vision API, and Named Entity Recognition (NER) 
    * Sustainability and long-term digital archive maintenance strategies 

- id: digital-curation
  title: "Digital Curation and Cultural Heritage"
  instructors: 
    - "Carol Chiodo"
  duration: "one week"
  abstract: |
    The large-scale digitization of cultural heritage, emerging forms of born-digital collections and archives, and the new ways in which researchers across disciplines engage with these materials are challenging traditional theories and practices in cultural heritage.  They also present new opportunities for practitioners and researchers working with digitized collections and archival materials by expanding the means of discovery, engagement, and stewardship.  These opportunities include the application of computational tools and methods, integrating computational analysis with traditional cultural heritage curation methods. 
    This workshop will introduce digital curation as it pertains to the cultural heritage sector, understood as the selection, acquisition, preservation, maintenance, and delivery of digital data derived from objects held by libraries and museums.  We will examine the intersection of emerging computational and analytical methods and technologies with museum collections, rare books and archival holdings while weighing the advantages and disadvantages for historical, social, scientific, and cultural research engagement with these materials. 
    The course will provide an overview of best practices for the management and stewardship of these born-digital and digitized holdings in libraries and museums and we will also explore recent applications of digital curation to cultural heritage, including generative AI, geospatial analysis, audiovisual curation, collections as data, and more.  The workshop is suitable for those new to the field, such as graduate students and early career scholars, as well as experienced practitioners interested in gaining new perspectives on computational curation in cultural heritage. 
  syllabus: |
    The large-scale digitization of cultural heritage, emerging forms of born-digital collections and archives, and the new ways in which researchers across disciplines engage with these materials are challenging traditional theories and practices in cultural heritage.  They also present new opportunities for practitioners and researchers working with digitized collections and archival materials by expanding the means of discovery, engagement, and stewardship.  These opportunities include the application of computational tools and methods, integrating computational analysis with traditional cultural heritage curation methods. 
    This workshop will introduce digital curation as it pertains to the cultural heritage sector, understood as the selection, acquisition, preservation, maintenance, and delivery of digital data derived from objects held by libraries and museums.  We will examine the intersection of emerging computational and analytical methods and technologies with museum collections, rare books and archival holdings while weighing the advantages and disadvantages for historical, social, scientific, and cultural research engagement with these materials. 
    The course will provide an overview of best practices for the management and stewardship of these born-digital and digitized holdings in libraries and museums and we will also explore recent applications of digital curation to cultural heritage, including generative AI, geospatial analysis, audiovisual curation, collections as data, and more.  The workshop is suitable for those new to the field, such as graduate students and early career scholars, as well as experienced practitioners interested in gaining new perspectives on computational curation in cultural heritage. 

- id: xml-tei
  title: "Digital XML-TEI Content Creation and Processing Aided by AI Tools"
  instructors: 
    - "Alejandro Bia"
  duration: "both weeks"
  abstract: |
    In this workshop, you’re going to learn how to create documents using XML-based encoding schemes like TEI, HTML, and ePub.  Additionally, you will discover how to manage document structure to normalize large collections and how to render and transform documents automatically using technologies such as CSS, XPath, and XSLT.  We will also explore how the most recent AI tools can help us perform some of these tasks.  
  syllabus: |
    In this workshop, you’re going to learn how to create documents using XML-based encoding schemes like TEI, HTML, and ePub.  Additionally, you will discover how to manage document structure to normalize large collections and how to render and transform documents automatically using technologies such as CSS, XPath, and XSLT.  We will also explore how the most recent AI tools can help us perform some of these tasks.  This workshop comprises two parts: 
    **Week 1: Introduction to XML-based technologies for text encoding** deals with producing digital text documents using XML vocabularies like TEI and HTML, as well as related technologies (ePub, Markdown, etc.).  This is a hands-on, introductory-level course. We will also introduce AI tools like ChatGPT to be used as an aid in document processing. 
    **Week 2: XML-TEI document structuring and rendering** deals with designing and validating document structures, as well as producing polished renderings through CSS stylesheets and XSLT transformations.  This is a hands-on, medium-high level course. 

- id: distant-reading
  title: "Distant Reading in R. Analyse the text & visualize the data"
  instructors: 
    - "Simone Rebora"
    - "Giovanni Pietro Vitali"
  duration: "both weeks"
  abstract: |
    Distant reading is one of the most well-known methodological approaches in digital humanities, formalized by Franco Moretti in the article _Conjectures on World Literature_ (2000).  It benefits greatly from computational tools. For this reason, we are proposing a course based on the use of R, one of the most popular programming languages in the scientific community today. 
    The philosophy of the course is to analyze text and visualize data, and its structure follows this dichotomy.  The objective is to introduce participants to different methodological perspectives and provide practical tools they can use in their own research.  The course offers a compact introduction to natural language processing, computational text analysis, machine learning, graph theory, and geospatial humanities.  By the end of the two-week course, participants will be able to use R and RStudio to apply textual and spatial analysis.  An important component of the course is data visualization, an area in which R excels, offering a comprehensive framework for creating graphs, maps, and trees. 
    The final part of the course will focus on open-source programs like Gephi, GIMP, and Inkscape, which allow users to manipulate and rework vector and graphical files.  The course is suitable for beginners who want to start their digital humanities training with a complete overview of the most common tools used for distant reading. 
  syllabus: |
    # The Workshop

    Distant reading is one of the most famous methodological approaches that has been constantly taking place in digital humanities, since its formalisation by Franco Moretti in the article *Conjectures on World Literature* (2000). Distant reading benefits greatly from the use of computational tools. For this reason, we are proposing a course based on the use of R, one of the most popular programming languages used today by the scientific community.

    The course is suitable for beginners who want to start digital humanities training with a complete overview of the most common tools used for distant reading.

    The philosophy of the course is to analyse the text & visualize the data and the course is structured on this dichotomy.

    The objective of the course is to provide the participants with methodological and practical tools that they can utilise for their own research. At the end of the two weeks, they will be able to use R and RStudio in order to apply textual and spatial analysis. R analysis displays results that can be easily presented by graphical representations such as graphs, trees, or maps. As a result, part of the course will be dedicated to open source programs like Gephi, Gimp and Inkscape, specific to the reworking of vectorial and graphical files.

    # Schedule

    The course takes place over two weeks in order to allow the participants to choose to attend one or both parts. However, participation to the entire course is strongly advised.

    The first week is dedicated to the basics of R and natural language processing, three of the most common methods used for distant reading (sentiment analysis, topic modeling, and stylometry) and a brief introduction to machine learning. The objective of this first week is to provide a basic theoretical / methodological understanding of distant reading techniques, together with the practical tools to analyse texts in an R environment.

    The second week is dedicated to data visualization. In this module the participants will focus on mapping, network analysis and graphics. The objective of this week is to give participants the tools to organise the visualisation of data graphically, chronologically, and spatially. If a participant is interested in the second week only, we will assume that s/he has a more than basic knowledge of R programming language.

    At the beginning of the course, the workshop leaders will divide the class in two groups according to their research interests. Each group will carry out some research to be presented on the last day of the workshop, using one of the methodologies introduced during the week.

    ### Week 1: Analyse the text
    
    | Time | Day 1 | Day 2 | Day 3 | Day 4 | Day 5 |
    | :--- | :--- | :--- | :--- | :--- | :--- |
    | **1st hour** | Intro to course | Natural Language Processing | Sentiment Analysis | Machine Learning | Topic Modeling |
    | **2nd hour** | Intro to R/RStudio | Natural Language Processing | Sentiment Analysis | Machine Learning | Topic Modeling |
    | **3rd hour** | Intro to R/RStudio | Natural Language Processing | Sentiment Analysis | Stylometry | Hands-on |
    | **4th hour** | Intro to R/RStudio | Natural Language Processing | Sentiment Analysis | Stylometry | Hands-on |

    ### Week 2: Visualize the data
    
    | Time | Day 6 | Day 7 | Day 8 | Day 9 | Day 10 |
    | :--- | :--- | :--- | :--- | :--- | :--- |
    | **1st hour** | Network (Gephi) | Network Analysis | Named-Entity Recognition | Mapping | Mapping |
    | **2nd hour** | Network (Gephi) | Network Analysis | Named-Entity Recognition | Mapping | Mapping |
    | **3rd hour** | Network (Gephi) | Inkscape & Gimp | Mapping (Coords) | Mapping | Mapping |
    | **4th hour** | Network (Gephi) | Inkscape & Gimp | Mapping (Coords) | Mapping | Mapping |

    # Technical Requirements

    1. Participants should have their own computer with at least 5-10GB of available space.
    2. Operating System: Windows (preferably 7+), Linux or Mac OSX.
    3. Java 8 for the operating system. You may need to create an Oracle account to download Java 8.
    4. Zip/unzip programs (these are programs that you normally have by default in your computer, like 7-Zip or WinZip for Windows, to manage compressed folders).
    5. Browser: Mozilla Firefox and Google Chrome.
    6. Simple text reading program (for txt and csv) like Sublime Text Editor 3 for Windows, Linux and Mac.
    7. Google account
    8. R
    9. RStudio and Xquartz (the latter for Mac)
    10. Openoffice
    11. Gephi
    12. Inkscape
    13. Gimp

- id: humanities-data-mapping
  title: "Humanities Data and Mapping Environments"
  instructors: 
    - "David Wrisley"
    - "Voica Pușcașiu"
  duration: "both weeks"
  abstract: |
    This spatial humanities workshop will introduce participants to different ways of thinking about humanities data, their curation within projects, and their use in digital mapping environments.  The workshop will not be a traditional course in Geographic Information Systems (GIS), although we will use open source GIS and web mapping along the way.  The workshop is designed for the total beginner who would like to explore how a spatial dimension can enrich humanities and interdisciplinary research projects and to learn some fundamental skills for collecting and organizing data in order to be able to integrate such methods into their research workflows.
    Drawing inspiration from the location of the ESU in the historical center of Besançon, participants will gather data from within the city and will work with data from local cultural institutions.  The workshop will also introduce students to ways in which artificial intelligence and machine learning are opening up new horizons for spatial humanities research.
  syllabus: |
    This spatial humanities workshop will introduce participants to different ways of thinking about humanities data, their curation within projects, and their use in digital mapping environments.  The workshop will not be a traditional course in Geographic Information Systems (GIS), although we will use open source GIS and web mapping along the way.  The workshop is designed for the total beginner who would like to explore how a spatial dimension can enrich humanities and interdisciplinary research projects and to learn some fundamental skills for collecting and organizing data in order to be able to integrate such methods into their research workflows.
    Drawing inspiration from the location of the ESU in the historical center of Besançon, participants will gather data from within the city and will work with data from local cultural institutions.  The workshop will also introduce students to ways in which artificial intelligence and machine learning are opening up new horizons for spatial humanities research.  The workshop lasts a total of 36 hours, two weeks of 18 contact hours each. 
    
    The central goals of the workshop are fourfold: 
    * to learn where we might obtain spatial data relevant to our research interests, or capture data from analog sources through digitization, 
    * to explore modeling data for a research project having a spatial dimension, 
    * to practice different ways that we can tell a story by visualizing spatial data, and 
    * to learn ways that we can disseminate and share that data. 
    
    ## Week 1
    In the first part of the course we conduct a critical review of a range of spatial humanities projects: their scope and the rhetorical strategies they employ for spatial storytelling and argument.  We will begin by reflecting on how location-based research might be incorporated into research projects in different disciplines (cinema, art history, anthropology, history, literature, etc.) as well as the challenges of incorporating a spatial dimension into research.  We will learn about the creation of data in formats relevant to spatial humanities projects (using gazetteers, mobile data collection, off-the-shelf software) as well as some basic querying in order to perform repetitive tasks for building a spatial dataset.  Students will be introduced to normalization and wrangling techniques and will contrast the manual, slow creation of data with more automated forms of analysis. 
    
    ## Week 2
    In the second part of the course, we will learn some skills in static site development so that we can host our own basic web maps.  We will experiment with other automated workflows and will turn to more complex forms of visualization and storytelling.  Open-source GIS software will be used to learn about georeferencing / warping and the creation of historical vector / polygon data from digitized historical maps.  Depending on the time available and participant interest, we may explore other topics of interest: discipline-specific gazetteers, mapping packages in R, OpenStreetMap, Wikidata, maps & IIIF, machine classification of features in historical or series maps, etc.  A Zotero library of supplementary readings will be provided by the instructors. 

- id: parliamentary-discourse
  title: "Big Data in the Chamber: Corpus-Assisted Studies of Parliamentary Discourse Across Time and Space"
  instructors: 
    - "Anna Kryvenko"
  duration: "both weeks"
  abstract: |
    Parliaments are pivotal institutions in democracies, shaping policies that impact citizens by deliberating critical societal issues.  The debates are commonly recorded as open-access digital proceedings enriched with metadata.  These records are valuable for researchers exploring political, societal, historical, cultural or communicational dynamics in fields such as linguistics, discourse analysis, political science, history, sociology, gender studies as well as for various teaching contexts. 
    This workshop takes advantage of the interoperability and comparability of the ParlaMint corpora containing parliamentary proceedings from 26 national and 3 regional parliaments across Europe at least between 2015 and 2022, although several ParlaMint corpora include data spanning a much longer period.  Available in the original languages and machine-translated to English, the corpora also feature metadata on speakers, parties and speeches, including names, gender, age, roles, party affiliation, power positions, political leanings, speech dates, topics and sentiment. 
    This hands-on project-oriented tutorial will provide skills and methodological training to explore ParlaMint version 5.0, which can be obtained by downloading the files or by accessing the preloaded data via online platforms – primarily noSketch Engine and TEITOK.  All data and tools are open access and can be used free of charge.  Designed for researchers in Social Sciences and Humanities with interest in parliamentary discourse but no or little familiarity with corpus linguistic tools, this workshop will train participants to leverage extensive content, annotations and metadata via user-friendly concordancers, facilitating research on individual national parliaments, enabling transnational comparisons, and fostering cross-disciplinary collaboration.  Participants with also discover CLARIN – Common Language Resources and Technology Infrastructure.
  syllabus: |
    # Abstract 
    Parliaments are pivotal institutions in democracies, shaping policies that impact citizens by  deliberating critical societal issues. The debates are commonly recorded as open-access digital  proceedings enriched with metadata. These records are valuable for researchers exploring  political, societal, historical, cultural or communicational dynamics in fields such as  linguistics, discourse analysis, political science, history, sociology, gender studies as well as  for various teaching contexts.  
    This workshop takes advantage of the interoperability and comparability of the  ParlaMint corpora containing parliamentary proceedings from 26 national and 3 regional  parliaments across Europe at least between 2015 and 2022, although several ParlaMint  corpora include data spanning a much longer period. Available in the original languages and  machine-translated to English, the corpora also feature metadata on speakers, parties and  speeches, including names, gender, age, roles, party affiliation, power positions, political  leanings, speech dates, topics and sentiment. This hands-on project-oriented tutorial will  provide skills and methodological training to explore ParlaMint version 5.0, which can be  obtained by downloading the files or by accessing the preloaded data via online platforms –  primarily noSketch Engine and TEITOK. All data and tools are open access and can be used  free of charge.  
    Designed for researchers in Social Sciences and Humanities with interest in  parliamentary discourse but no or little familiarity with corpus linguistic tools, this workshop  will train participants to leverage extensive content, annotations and metadata via user friendly concordancers, facilitating research on individual national parliaments, enabling  transnational comparisons, and fostering cross-disciplinary collaboration. Participants with  also discover CLARIN – Common Language Resources and Technology Infrastructure.  
    # Learning outcomes  
    Participants will discover CLARIN’s language resources and gain skills for querying  ParlaMint corpora, including simple and advanced CQL queries. They will learn to analyse  extracted results alongside speaker and text metadata, including sentiment and topic analysis  under the ParlaCAP project. Additionally, they will learn to frame and interpret the results for  various Digital Humanities and Social Sciences research questions, such as comparing  speeches and attitudes of ruling and opposition parties or exploring parliamentary protocol  variations. The techniques taught are transferable to other corpora and concordancers. The  showcases will use ParlaMint-GB containing proceedings from the UK Parliament, and the  machine-translated version of all other ParlaMint corpora into English (Parlamint\_xx\_en) to  ensure all participants can follow queries and discuss results. However, for the hands-on  activities and project work, the participants will be encouraged to use the ParlaMint corpora in  other languages.  
    # Datasets  
    ParlaMint version 5.0 can be downloaded from the CLARIN.SI repository as a TEI-encoded  corpus, a linguistically marked-up corpus in several formats and a version machine-translated  into English, all with added metadata files. For on-line analysis, different versions of the  ParlaMint corpora are preloaded to various tooks, including noSketch Engine (up to v. 5.0)  and TEITOK (v. 4.1).  
    # Teaching materials 
    Digital textbook    
    Pahor de Maiti Tekavčič, K., & Kryvenko, A. (2026). From the dispatch box: Unlocking the  potential of ParlaMint through noSketch Engine and TEITOK (Ed. 1.0) \[E book\].  Inštitut za novejšo zgodovino / Institute of Contemporary History.  
       
    Other ParlaMint tutorials including    
    Parliamentary Speech Analysis with ParlaMint  
    CLARIN’s tutorials    
    Introduction to CLARIN    
    Introduction to Language Data: Standards and Repositories 
    Further reading (optional): selected chapters / sections from academic publications, including  below, will be provided by the instructor:  
    Gillings, M., Mautner, G., & Baker, P. (2023). Corpus-Assisted Discourse Studies.  Cambridge: Cambridge University Press.  
    Korhonen, M., Kotze, H. & Tyrkkö, J. (2023). Exploring Language and Society with Big  Data: Parliamentary discourse across time and space. John Benjamins Publishing  Company.  
    Brezina, V. (2018). Statistics in Corpus Linguistics: A Practical Guide. Cambridge:  Cambridge University Press.  
    # Technical requirements  
    Organisers should provide an LCD projector with a HDMI output, WIFI and some  power extension cords for the participants.  
    Participants should bring their own laptops. Participants are also advised to create a  free personal account at https://www.clarin.si/skelog prior to the beginning of the workshop.  
    
    # Brief course timeline  
    
    ## Week 1 (15 hours \+ an open teaser session)  
    Day 1  
    * Introduction to CLARIN’s language data tools and resources    
    * Introduction to the ParlaMint corpora and related projects    
    * “Adopting” a ParlaMint corpus (corpora) and planning project work  Daily reflection
    
    Day 2  
    * Studying parliamentary discourse via corpora. How verbatim are transcripts?   
    * Assessing the ParlaMint datasets via user-friendly tools    
    * Daily reflection  
    
    Day 3  
    * ParlaMint provenance information, structural markup, linguistic annotation and metadata    
    * Delimiting searches and contextualising results    
    * Daily reflection 
    
    Day 4  
    * An overview of corpus linguistic techniques for studying parliamentary discourse  Extracting and interpreting frequency    
    * Daily reflection  
    
    Day 5  
    * Combining distant and close reading for studying parliamentary discourse  
    * Concordance analysis    
    * Daily reflection  
    
    ## Week 2 (15 hours \+ an open teaser session)  
    Day 1  
    * Understanding statistics in ParlaMint    
    * Collocation analysis    
    * Daily reflection  
    
    Day 2  
    * Creating and comparing subcorpora    
    * Keyword analysis    
    * Daily reflection  
    
    Day 3  
    * Examining sentiment across parliamentary parties over time    
    * Using different techniques at different stages of analysis (1)    
    * Daily reflection  
    
    Day 4  
    * Examining the gendered dimension of topic distribution across European parliaments   
    * Using different techniques at different stages of analysis (2)    
    * Daily reflection  
    
    Day 5  
    * Individual project presentations    
    * Critical appreciation of peer projects    
    * Course feedback  
    
    # Acknowledgement    
    The creation of this course was supported by Horizon Europe via the OSCARS Open Science  cascading grant project Comparing agenda settings across parliaments via the ParlaMint  dataset (ParlaCAP) (2025 – 2026), and the Slovenian Research Agency via the research  programme P6-0436 Digital Humanities: resources, tools and methods (2022-2027) and the  research project J6-60112 Parliament in the Age of Europeanisation: the Czech Republic and  Slovenia (ParlAgE) (2025-2028).  

- id: stylometry
  title: "Introduction to Stylometry"  
  instructors: 
    - "Jeremi Ochab"
  duration: "one week"
  abstract: |
    You may have heard that computational text analysis for digital humanities and cultural analytics is fun. We assure you it’s not: it’s a grim endeavour that can easily go wrong really quickly and requires patience, expertise and making responsible choices. In this one-week course, we offer a comprehensive survival guide to multivariate text analysis with R, where we start with the basics of counting words and spend a lot of time on fundamentals: text representation, calculation of differences and similarities, vector manipulations, unsupervised and supervised methods of text classification. We will guide you through the user-friendly interface of `stylo` software to introduce important concepts and operations. Then, we will show you how to expand on that: understand the workflow, design your own research, discuss real-world studies and run simple replication experiments.
  syllabus: |
    You may have heard that computational text analysis for digital humanities and cultural analytics is fun. We assure you it’s not: it’s a grim endeavour that can easily go wrong really quickly and requires patience, expertise and making responsible choices. In this one-week course, we offer a comprehensive survival guide to multivariate text analysis with R, where we start with the basics of counting words and spend a lot of time on fundamentals: text representation, calculation of differences and similarities, vector manipulations, unsupervised and supervised methods of text classification. We will guide you through the user-friendly interface of `stylo` software to introduce important concepts and operations. Then, we will show you how to expand on that: understand the workflow, design your own research, discuss real-world studies and run simple replication experiments. By the end of the course, you will be able to pursue research questions like:
    * Which textual features can betray an author’s or translator’s identity?
    * What unconscious elements of language reflect the author’s education, gender, religious background, and social or historical conditions?
    * What elements of style are affected by literary period, genre, and topic?
    * What are the textual relationships between books or authors? 
    Week 1: Fundamentals
    * Day 1. Sorrows of software set-up and introduction to crimes of literary computation
    * Day 2. Torture of text representations and multidimensional misery
    * Day 3. Unsupervised and network analysis abyss
    * Day 4. Classification carnage
    * Day 5. Agony of application: authorship, genre, gender, poetic meters

- id: voices-as-data
  title: "Voices as Data: Computational Phonetics and Responsible AI for Cultural Soundscapes"
  instructors: 
    - "Katarzyna Foremniak"
    - "Mariusz Sozański"
  duration: "both weeks"
  abstract: |
    While Digital Humanities has extensively explored textual and visual sources, the computational analysis of speech and vocal performance remains underrepresented.  This two-week workshop introduces voice as structured cultural data and critically examines how AI technologies mediate access to vocal heritage. 
    Participants will learn how to design and curate small speech corpora, extract acoustic and prosodic features, and apply basic statistical models to analyze phonetic variation.  Building on these foundations, the workshop integrates AI-based speech technologies, including automatic speech recognition and large language models, with a strong emphasis on evaluation, bias detection, and epistemic risk.  Rather than focusing on tool usage alone, the course foregrounds responsible AI practices, transparency, and reproducibility in the analysis of spoken cultural data. 
    Through hands-on sessions using open datasets such as Mozilla Common Voice and selected oral history recordings, participants will collaboratively build a reusable, open-source research toolkit hosted on GitHub.  This toolkit will include containerized workflows, analysis notebooks, documentation, and a responsible-AI framework tailored to speech data in humanities research.  The workshop combines computational practice, infrastructural awareness, and critical reflection, empowering participants from diverse disciplinary backgrounds to treat voice as analyzable cultural evidence while remaining attentive to ethical, methodological, and social implications.  No advanced programming skills are required. 
  syllabus: |
    While Digital Humanities has extensively explored textual and visual sources, the computational analysis of speech and vocal performance remains underrepresented.  This two-week workshop introduces voice as structured cultural data and critically examines how AI technologies mediate access to vocal heritage. 
    Participants will learn how to design and curate small speech corpora, extract acoustic and prosodic features, and apply basic statistical models to analyze phonetic variation.  Building on these foundations, the workshop integrates AI-based speech technologies, including automatic speech recognition and large language models, with a strong emphasis on evaluation, bias detection, and epistemic risk.  Rather than focusing on tool usage alone, the course foregrounds responsible AI practices, transparency, and reproducibility in the analysis of spoken cultural data. 
    Through hands-on sessions using open datasets such as Mozilla Common Voice and selected oral history recordings, participants will collaboratively build a reusable, open-source research toolkit hosted on GitHub.  This toolkit will include containerized workflows, analysis notebooks, documentation, and a responsible-AI framework tailored to speech data in humanities research.  The workshop combines computational practice, infrastructural awareness, and critical reflection, empowering participants from diverse disciplinary backgrounds to treat voice as analyzable cultural evidence while remaining attentive to ethical, methodological, and social implications.  No advanced programming skills are required. 

- id: measuring-manuscripts
  title: "Measuring Manuscripts: Quantitative Approaches to Ancient Language and Script"
  instructors: 
    - "Christian Casey"
  duration: "both weeks"
  abstract: |
    This two-week workshop introduces participants to computational philology through hands-on work with manuscripts, text corpora, and digital tools.  The course begins with traditional philological methods—textual criticism, paleography, orthography, and phonology—and then shows how these practices can be structured, modeled, and analyzed using accessible computational techniques. 
    Participants will learn how to build small digital corpora, align textual variants, generate concordances and word lists, and encode script and linguistic data in structured formats.  The workshop introduces basic quantitative approaches such as frequency analysis, diachronic comparison, simple statistical correlation, and exploratory visualization (including clustering and dimensionality reduction).  Students will also explore how sound data, script data, and textual data can be treated as analyzable datasets. 
    Throughout the course, each participant develops a small individual project based on one method covered in class (e.g., a concordance, variant alignment, paleographic clustering visualization, diachronic frequency comparison, or phonological analysis).  In the final sessions, students publish their project online using lightweight, sustainable infrastructure.  No prior programming experience is required. By the end of the workshop, participants will have designed, implemented, and publicly shared a small born-digital philological project grounded in structured data and computational analysis. 

  syllabus: |
    # Overview
    ## Summary
    This course introduces participants to computational philology through the study of manuscripts, text corpora, online databases, available tools, and custom-built software. It begins with traditional philological methods and gradually introduces workflows, quantitative analysis, and online publication of digital research.
    ## Intended Outcomes
    Upon completion of the course, participants will be able to…
    * articulate traditional philological methods and explain how digital approaches extend and formalize them
    * structure manuscript and linguistic data in digital form
    * build small digital corpora and generate concordances, word lists, and aligned variant texts
    * perform basic quantitative analyses of language and script (frequency distributions, correlation, diachronic comparison, simple
    information-theoretic measures)
    * apply exploratory visualization techniques (e.g., clustering, dimensionality reduction) to textual and paleographic data
    * formulate computationally tractable research questions and design small experiments to test philological hypotheses
    * critically interpret computational results and understand the limits of quantitative methods in historical research
    * design and publish a small born-digital philological project online using sustainable, lightweight infrastructure

    ## Prerequisites
    This course will teach all required digital techniques, including hands-on introduction to widely used digital tools and basic programming concepts. No prior programming experience is required. All programming activities will be based on structured templates and guided examples.
    When appropriate, we will also critically discuss and demonstrate the use of AI-assisted coding tools. Rather than treating them as black boxes, students will learn how such tools can support structured experimentation while retaining full intellectual control over methods and results.
    Students who arrive with programming experience will be offered additional or augmented in-class activities.

    ## Datasets and Materials
    All datasets used in this project are publicly available online or will be provided to the students by the instructor.

    ## Technical Requirements
    Students must come equipped with a laptop for writing code. Tablets with physical keyboards may be used if it is possible to write code efficiently with them, but laptops should be preferred.

    ## Final Project
    Students will produce one final project throughout their time in the course, which they will publish online at the end of the two-week classwork period. Some possible projects include (but are not limited to):
    * Concordance
    * Variant alignment
    * Morphological tagging demonstration
    * Paleographic clustering visualization
    * Diachronic frequency comparison

    # Course Schedule

    ## Bonus Teaser Session
    What is computational philology?
    * What exactly is philology?
    * How can we do it with computers?
    * What can computers do that traditional methods cannot?
    * Demonstration of a small computational philology project (the kind students will build)
    * Introduction of the final project: choosing one technique to develop and publish

    ## Week 1: Philological Foundations
    Day 1: Traditional Philology as Method
    * What is philology and how do (did) we do it?
    * Textual criticism and the material transmission of texts
    * Textual analysis at the level of words, variants, and meaning
    * Palaeography and scribal practice
    * Orthography and variation
    * Phonology as reconstruction and interpretation
    * The birth of linguistics and The Schism
    * Project check-in: identifying possible areas for final project focus
    
    Day 2: Textual Criticism
    * Philosophical underpinnings of textual reconstruction
    * Alternative views (e.g. synoptic text editions and non-stemmatic models) * Variant alignment as structured comparison
    * Bioinformatics approaches to textual transmission
    * Visualizing cladograms and transmission trees
    * Hands-on exploration of a small aligned text dataset
    * Project check-in: how variant alignment could become a small digital project
    
    Day 3: Text as Data
    * What is a word?
    * Lemmatizers and parsers (conceptual overview and demonstration) * Generating concordances and word lists automatically
    * Linking lexical data across corpora
    * Building small digital corpora from structured text
    * Hands-on creation of a miniature text-analysis pipeline
    * Project check-in: drafting the data component of each student’s final project
    
    Day 4: Script as Data
    * Graph vs. grapheme
    * Digitizing manuscripts and defining annotation units
    * Sign segmentation and overlap problems
    * Solutions to common digitization challenges
    * HTR overview: what exists and what remains difficult
    * Demonstration of paleographic clustering and sign comparison * Project check-in: identifying possible script-based project directions
    
    Day 5: Sound as Data
    * Phone vs. phoneme
    * Working with audio data and phonetic features
    * Working with online phonetic resources and structured datasets * Analyzing phonetic features computationally
    * Connecting modern phonetic data to ancient languages
    * Discussion: how sound can be modeled and measured historically * Project check-in: short informal proposal discussion
    
    ## Week 2: Modeling, Analyzing, Publishing
    Day 6: Measuring Script and Language
    * Information theory foundations in accessible form
    * Frequency distributions and statistical analysis
    * Measuring complexity and variation
    * Finding meaningful relationships vs. spurious patterns
    * Guided exercise applying basic quantitative analysis
    * Project check-in: refining chosen method and dataset
    
    Day 7: Visualization
    * Making philological analysis legible and interpretable
    * Dimensionality reduction (conceptual overview)
    * Choosing the right approach for different questions
    * Using visualization tools
    * Interpreting clusters and outliers critically
    * Project check-in: designing visual component of final project
    
    Day 8: Research Questions
    * Asking tractable questions in computational philology
    * Formulating reasonable, testable hypotheses
    * Designing experiments to test philological questions
    * Understanding limitations and methodological risks
    * Structuring a clear research narrative for a digital project
    * Project check-in: outline and technical checklist
    
    Day 9: Sustainability, Accessibility, Infrastructure
    * Designing born-digital publications for philological work * Making materials accessible online (format, structure, documentation) * Why digital projects die and how to avoid it
    * Sustainability in digital publishing (lightweight infrastructure, versioning, archiving)
    * Introduction to GitHub Pages template for final project * Project check-in: building and preparing for publication
    
    Day 10: Project Workshop & Publication
    * Finalize final project
    * Publish online using GitHub Pages
    * Present results to the class
    * Analyze and critique together
    * Discussion of next steps: expanding toy models into research projects 

- id: critical-ai
  title: "Critical AI and Large Language Models for Humanists"
  instructors: 
    - "Anouk Lang"
  duration: "2nd week"
  abstract: |
    This course is based on the premise that scholarly expertise from the humanities can, and should, be brought to bear on understanding how generative AI and related algorithmic technologies work, their broader effects on the world, and how we might more thoughtfully and responsibly engage with them.  The course seeks to give enough technical background—from the probabilistic underpinnings of large language models to considerations of training corpora and interface design—for participants to be able to take an informed stance on the pressing social, ethical and environmental concerns emerging around generative AI, and to better understand the potential impact of these technologies on institutions important to the continued functioning of democracy such as the media and education.  It incorporates hands-on activities which offer participants the chance to explore features of the technologies for themselves and follow their own interests. 
    In bringing together developments from one set of disciplinary orientations—the fields of science and technology studies (STS) and critical AI—together with theoretical and methodological approaches from humanities subjects—such as historical perspectives on text generation technologies and insights from literary theory with established explanatory power for grasping the workings of narrative, genre and style—it seeks to model for participants a reflexively critical orientation to ‘AI’ not as the singular, stable entity which is so often the referent of technocapitalist hype, but as a collection of imbricating technologies emerging from specific historical and cultural contexts whose putative dominance we have the ability to critique and to contest.
  syllabus: |
    The formal part of the course begins on Monday with a historical perspective on text  generation technologies (eg. ELIZA, Markov chains), leading to GPT-2 and GPT-3 experiments and what they can tell us about genre. We then move to considering training corpora and  what goes into building them, and how the idiosyncrasies of training data shape machine  learning outputs.  
    On Tuesday, participants will be introduced to word embeddings and the notion of  multidimensional vector space as a way of capturing the diversity of contexts in which a  word or token appears. We will look at examples of digital humanities research that uses word embeddings to probe the relationship between concepts and the discursive  environments in which they circulate, and participants will be able to try vector algebra for  themselves using pre-trained models of historical texts. 
    On Wednesday, we turn to the question of ‘bias’ in LLMs, beginning with a critique of the  notion of debiasing, and using AI-generated poetry and pseudo-criticism to think about what  happens when statistical data about the proximity of tokens in an LLM evacuates the  historical significance of words and phrases. We spend some time considering how these  and other problems relate to interface design and how AI companies attempt to mitigate  them, testing different chatbots against a model’s ‘soul document’.  
    Thursday’s sessions are themed around pedagogy and education. Participants will be  presented with suggestions for ways that generative AI may be potentially helpful in the  classroom, followed by hands-on work with a tool designed to help communities of  practice—such as secondary school teachers and university tutors—establish norms for  acceptable AI use among themselves. We will think about the post-generative AI classroom  in terms of designing for critical AI literacy, and look at examples of learning and assessment  tasks which build in AI literacy without compromising the core content of the course. 
    On Friday, we will think about changes to information ecologies and the authentication of  knowledge from a range of disciplinary perspectives, including law, information science and  literary theory. From here we will move to a critical interrogation of AI hype as articulated by  tech companies, including its roots in science fiction, and will discuss insights from key  thinkers from feminist STS such as Lucy Suchman and Donna Haraway on the necessity of  understanding AI as something other than a singular, reified entities. 
    While the morning sessions will be made up of a combination of lecturing, hands-on  exploration and group discussion, the afternoon sessions across the week will have a slightly  different rhythm, as they will consist for the most part of readings and discussions about the 
    challenges and harms of AI. Participants will be asked, each day, to read a small number of  short, accessible sources setting out the consequences – social, cognitive, psychological,  democratic, economic, environmental and more – of AI and other algorithmically driven  technologies whose emergent effects are gradually coming to light, and this will feed into  group discussion. Sources will be gathered in an online group library which will act as a  resource to which participants will continue to have access after the course is over, and to  which they can add further sources if required. Where time allows there may also be hands on activities, eg. exploring data visualizations designed to surface bias in an LLM, and the  opportunity to “make your own deepfake”. The course will conclude with an audit of where  machine learning is incorporated into participants’ lives and how its effects might be  mitigated.

- id: statistics
  title: "Introduction to Statistics and Modelling for the Humanities"
  hidden: true
  instructors: 
    - "Ben Nagy"
  duration: "both weeks"
  abstract: |
  syllabus: |
    This course introduces students with no mathematical background to basic descriptive statistics and modelling.  Over 5 sessions (15hrs instruction, 15hrs practice) it progresses from statistical distributions, univariate description and testing, to basic frequentist modelling and interpretation (regression, etc) and finishes with an introduction to Bayesian inference.  Students need only a very basic familiarity with the Python programming language (this is not a programming course, but the activities are carried out using Python tools). 