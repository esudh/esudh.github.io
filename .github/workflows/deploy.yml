name: Deploy Jekyll with dynamic baseurl

on:
  push:
    branches: ["master"] # Ensure this matches your branch name (master or main)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard version for Jekyll
          bundler-cache: true # Runs 'bundle install' and caches gems automatically

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: |
          repo_name=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          bundle exec jekyll build --baseurl "/$repo_name"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4