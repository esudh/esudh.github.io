  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Standard version for Jekyll
          bundler-cache: true # Runs 'bundle install' and caches gems automatically

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: |
          repo_name=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          bundle exec jekyll build --baseurl "/$repo_name"
          
          # Manually copy the static archive into the deployment directory
          if [ -d "2025" ]; then
            cp -r 2025 _site/
            echo "Successfully moved /2025 to _site"
          else
            echo "Error: /2025 directory not found"
          fi
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: ${{ github.repository }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4